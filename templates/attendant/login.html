<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ParkingLot</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-brand h1 {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-brand p {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <h1>🅿 ParkingLot</h1>
        <p>Attendant Sign In</p>
      </div>

      <div class="alert alert-error" id="login-error"></div>

      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" id="username" placeholder="Enter your username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <button class="btn btn-primary btn-lg btn-block" type="submit" id="login-btn">
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('login-error');
    const loginBtn = document.getElementById('login-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.remove('visible');
      loginBtn.disabled = true;
      loginBtn.innerHTML = '<span class="spinner"></span> Signing in…';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/api/v1/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();

        if (!res.ok) {
          const msg = data.detail || data.message || 'Invalid credentials';
          errorEl.textContent = `⚠ ${msg}`;
          errorEl.classList.add('visible');
          loginBtn.disabled = false;
          loginBtn.textContent = 'Sign In';
          return;
        }

        // Store tokens
        localStorage.setItem('access_token', data.access);
        localStorage.setItem('refresh_token', data.refresh);

        // Redirect to dashboard
        window.location.href = '/attendant/';
      } catch (err) {
        errorEl.textContent = '⚠ Network error — please try again';
        errorEl.classList.add('visible');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
      }
    });

    // If already logged in, redirect
    if (localStorage.getItem('access_token')) {
      window.location.href = '/attendant/';
    }
  </script>
</body>
</html>
