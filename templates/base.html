{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ParkingLot Management System — Attendant Console">
  <title>{% block title %}ParkingLot{% endblock %} — Attendant Console</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  {% block extra_css %}{% endblock %}
</head>
<body>
  <div class="app-shell">

    <!-- ──── Sidebar ──── -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <h1>🅿 ParkingLot</h1>
        <p>Management System</p>
      </div>

      <ul class="sidebar-nav">
        <li>
          <a href="{% url 'attendant:dashboard' %}"
             class="{% if active_page == 'dashboard' %}active{% endif %}">
            <span class="nav-icon">📊</span>
            Dashboard
          </a>
        </li>
        <li>
          <a href="{% url 'attendant:scan_ticket' %}"
             class="{% if active_page == 'scan' %}active{% endif %}">
            <span class="nav-icon">🎫</span>
            Scan Ticket
          </a>
        </li>
        <li>
          <a href="{% url 'attendant:checkout' %}"
             class="{% if active_page == 'checkout' %}active{% endif %}">
            <span class="nav-icon">💳</span>
            Checkout
          </a>
        </li>
      </ul>

      <!-- User info block -->
      <div class="sidebar-user">
        <div class="avatar" id="user-avatar">—</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">Loading…</div>
          <div class="user-role" id="user-display-role">—</div>
        </div>
      </div>
    </aside>

    <!-- ──── Main content ──── -->
    <main class="main-content">
      {% block content %}{% endblock %}
    </main>

  </div>

  <!-- ──── Global JS ──── -->
  <script>
    // ─── Token helpers ─────────────────────────────────────
    const API_BASE = '/api/v1';

    function getToken() {
      return localStorage.getItem('access_token');
    }

    function getRefreshToken() {
      return localStorage.getItem('refresh_token');
    }

    async function refreshAccessToken() {
      const refresh = getRefreshToken();
      if (!refresh) { redirectToLogin(); return null; }
      try {
        const res = await fetch(`${API_BASE}/auth/refresh/`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ refresh }),
        });
        if (!res.ok) { redirectToLogin(); return null; }
        const data = await res.json();
        localStorage.setItem('access_token', data.access);
        if (data.refresh) localStorage.setItem('refresh_token', data.refresh);
        return data.access;
      } catch { redirectToLogin(); return null; }
    }

    async function apiFetch(url, options = {}) {
      let token = getToken();
      if (!token) { redirectToLogin(); return null; }

      options.headers = options.headers || {};
      options.headers['Authorization'] = `Bearer ${token}`;
      options.headers['Content-Type'] = options.headers['Content-Type'] || 'application/json';

      let res = await fetch(url, options);
      if (res.status === 401) {
        token = await refreshAccessToken();
        if (!token) return null;
        options.headers['Authorization'] = `Bearer ${token}`;
        res = await fetch(url, options);
      }
      return res;
    }

    function redirectToLogin() {
      window.location.href = '/attendant/login/';
    }

    // ─── Load user info ────────────────────────────────────
    async function loadUserInfo() {
      const res = await apiFetch(`${API_BASE}/auth/users/me/`);
      if (!res || !res.ok) return;
      const data = await res.json();
      const username = data.username || data.data?.username || '?';
      const role = data.role || data.data?.role || '?';
      document.getElementById('user-display-name').textContent = username;
      document.getElementById('user-display-role').textContent = role;
      document.getElementById('user-avatar').textContent = username.charAt(0).toUpperCase();
    }

    // Init
    if (!getToken()) {
      redirectToLogin();
    } else {
      loadUserInfo();
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
