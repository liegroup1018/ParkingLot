<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Dashboard | Parking Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            100: '#ffedd5',
                            500: '#f97316',
                            900: '#7c2d12',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">
    <nav class="bg-brand-900 border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold text-white tracking-widest">🅿️ PARKING<span class="font-light text-brand-100">CLOUD</span> ADMIN</span>
                </div>
                <div class="flex items-center space-x-4">
                    <span class="bg-brand-500 text-white px-3 py-1 rounded-full text-xs font-semibold" id="nav-username">—</span>
                    <button onclick="handleLogout()" class="text-sm font-medium text-gray-300 hover:text-white transition cursor-pointer">Sign Out</button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold text-gray-900">Operational Overview</h1>
            <button onclick="fetchDashboardData()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded shadow transition inline-flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Refresh Data
            </button>
        </div>

        <!-- KPI Summary Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500">
                <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide">Total Revenue (Last 7 Days)</h2>
                <div class="mt-2 flex items-baseline">
                    <span class="text-4xl font-extrabold text-gray-900" id="kpi-revenue">$--.--</span>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-blue-500">
                <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide">Overall Occupancy</h2>
                <div class="mt-2 flex items-baseline">
                    <span class="text-4xl font-extrabold text-gray-900" id="kpi-occupancy">--%</span>
                </div>
                <div class="mt-1 text-sm text-gray-500" id="kpi-occupancy-subs">-- spots available</div>
            </div>

            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500">
                <h2 class="text-sm font-medium text-gray-500 uppercase tracking-wide">Dynamic Pricing Module</h2>
                <p class="mt-2 text-sm text-gray-600 mb-3">Adjust default hourly rates interactively.</p>
                <button onclick="openPricingModal()" class="w-full bg-indigo-50 text-indigo-700 hover:bg-indigo-100 hover:shadow font-medium py-2 px-4 rounded transition">
                    Configure Rules
                </button>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Revenue Line Chart -->
            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Daily Revenue Trends</h3>
                <div class="relative h-64 w-full">
                    <canvas id="revenueChart"></canvas>
                </div>
            </div>

            <!-- Occupancy Pie Chart -->
            <div class="bg-white rounded-xl shadow p-6">
                <h3 class="text-lg font-bold text-gray-900 mb-4">Current Capacity Usage</h3>
                <div class="relative h-64 w-full flex justify-center">
                    <canvas id="occupancyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Peak Hours Bar Chart -->
        <div class="bg-white rounded-xl shadow p-6 w-full">
            <h3 class="text-lg font-bold text-gray-900 mb-4">Peak Entry Times (Today)</h3>
            <div class="relative h-64 w-full">
                <canvas id="peakChart"></canvas>
            </div>
        </div>
    </main>

    <!-- Pricing Modal -->
    <div id="pricingModal" class="fixed inset-0 z-50 hidden bg-gray-900 bg-opacity-75 flex items-center justify-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg p-8 transform transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-bold text-gray-900">Pricing Configuration</h3>
                <button onclick="closePricingModal()" class="text-gray-400 hover:text-gray-600 transition">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <form id="pricingForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Rule ID to Update</label>
                    <input type="number" id="ruleId" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 bg-gray-50 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Hourly Rate ($)</label>
                    <input type="number" step="0.01" id="hourlyRate" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 bg-gray-50 border">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">New Maximum Daily Rate ($)</label>
                    <input type="number" step="0.01" id="maxRate" required class="w-full border-gray-300 rounded-lg shadow-sm focus:border-indigo-500 focus:ring-indigo-500 p-2.5 bg-gray-50 border">
                </div>
                
                <div class="pt-4 flex justify-end space-x-3">
                    <button type="button" onclick="closePricingModal()" class="px-5 py-2.5 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 transition">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // -----------------------------------------------------------------------
        // Auth guard — redirect to login if no token in sessionStorage
        // -----------------------------------------------------------------------
        const ACCESS_KEY  = 'admin_access_token';
        const REFRESH_KEY = 'admin_refresh_token';

        function getAccessToken() {
            return sessionStorage.getItem(ACCESS_KEY);
        }

        (function guardPage() {
            if (!getAccessToken()) {
                window.location.replace('/admin-dashboard/login/');
            }
        })();

        // -----------------------------------------------------------------------
        // Populate username in nav bar from the /me/ endpoint
        // -----------------------------------------------------------------------
        async function loadCurrentUser() {
            try {
                const res = await apiFetch('/api/v1/auth/users/me/');
                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('nav-username').textContent = data.username || '—';
                }
            } catch (_) {}
        }

        // -----------------------------------------------------------------------
        // JWT-aware fetch wrapper (mirrors the attendant UI's apiFetch).
        // Automatically attaches the Bearer token; on 401 attempts one
        // silent token refresh before giving up and redirecting to login.
        // -----------------------------------------------------------------------
        async function apiFetch(url, options = {}) {
            const token = getAccessToken();
            const defaultHeaders = {
                'Accept': 'application/json',
                'Content-Type': 'application/json',
                ...(token ? { 'Authorization': 'Bearer ' + token } : {}),
            };
            options.headers = { ...defaultHeaders, ...(options.headers || {}) };

            let res = await fetch(url, options);

            if (res.status === 401) {
                // Attempt silent token refresh
                const refreshed = await tryRefresh();
                if (!refreshed) {
                    sessionStorage.removeItem(ACCESS_KEY);
                    sessionStorage.removeItem(REFRESH_KEY);
                    window.location.replace('/admin-dashboard/login/');
                    return res;
                }
                // Retry original request with the new token
                options.headers['Authorization'] = 'Bearer ' + getAccessToken();
                res = await fetch(url, options);
            }
            return res;
        }

        async function tryRefresh() {
            const refresh = sessionStorage.getItem(REFRESH_KEY);
            if (!refresh) return false;
            try {
                const res = await fetch('/api/v1/auth/refresh/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ refresh }),
                });
                if (!res.ok) return false;
                const data = await res.json();
                sessionStorage.setItem(ACCESS_KEY, data.access);
                if (data.refresh) sessionStorage.setItem(REFRESH_KEY, data.refresh);
                return true;
            } catch (_) { return false; }
        }

        // -----------------------------------------------------------------------
        // Logout — blacklist the refresh token via the API, then clear storage
        // -----------------------------------------------------------------------
        async function handleLogout() {
            const refresh = sessionStorage.getItem(REFRESH_KEY);
            if (refresh) {
                try {
                    await apiFetch('/api/v1/auth/logout/', {
                        method: 'POST',
                        body: JSON.stringify({ refresh }),
                    });
                } catch (_) { /* best-effort */ }
            }
            sessionStorage.removeItem(ACCESS_KEY);
            sessionStorage.removeItem(REFRESH_KEY);
            window.location.replace('/admin-dashboard/login/');
        }

        // -----------------------------------------------------------------------
        // Chart instances
        // -----------------------------------------------------------------------
        let revChartInstance  = null;
        let occChartInstance  = null;
        let peakChartInstance = null;

        document.addEventListener('DOMContentLoaded', () => {
            loadCurrentUser();
            fetchDashboardData();
        });

        async function fetchDashboardData() {
            // Fetch Occupancy
            try {
                const res = await apiFetch('/api/v1/lot/occupancy/');
                const json = await res.json();
                updateOccupancy(json.data || json);
            } catch (err) { console.error('Occupancy fetch failed', err); }

            // Fetch Revenue (last 7 days)
            try {
                const end   = new Date();
                const start = new Date();
                start.setDate(end.getDate() - 7);
                const query = `?start_date=${start.toISOString().split('T')[0]}&end_date=${end.toISOString().split('T')[0]}`;
                const res  = await apiFetch(`/api/v1/reports/revenue/${query}`);
                const data = await res.json();
                updateRevenue(data);
            } catch (err) { console.error('Revenue fetch failed', err); }

            // Fetch Peak Hours
            try {
                const res  = await apiFetch('/api/v1/reports/peak-hours/');
                const data = await res.json();
                updatePeakHours(data);
            } catch (err) { console.error('Peak fetch failed', err); }
        }

        function updateOccupancy(data) {
            let totalCap = 0, currentCounts = 0;
            const labels = [], capacities = [], occupancies = [];

            data.forEach(item => {
                totalCap      += item.total_capacity;
                currentCounts += item.current_count;
                labels.push(item.spot_size);
                capacities.push(item.total_capacity);
                occupancies.push(item.current_count);
            });

            const occPercent = totalCap === 0 ? 0 : Math.round((currentCounts / totalCap) * 100);
            document.getElementById('kpi-occupancy').innerText      = `${occPercent}%`;
            document.getElementById('kpi-occupancy-subs').innerText = `${totalCap - currentCounts} spots available`;

            const ctx = document.getElementById('occupancyChart').getContext('2d');
            if (occChartInstance) occChartInstance.destroy();
            occChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data: occupancies,
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f97316', '#10b981', '#6366f1']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updateRevenue(data) {
            let totalRev = 0;
            const labels = [], totals = [];
            data.forEach(item => {
                totalRev += item.total_revenue;
                labels.push(item.date);
                totals.push(item.total_revenue);
            });
            document.getElementById('kpi-revenue').innerText = `$${totalRev.toFixed(2)}`;

            const ctx = document.getElementById('revenueChart').getContext('2d');
            if (revChartInstance) revChartInstance.destroy();
            revChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels,
                    datasets: [{
                        label: 'Daily Revenue ($)',
                        data: totals,
                        borderColor: '#10b981',
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        fill: true,
                        tension: 0.3,
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function updatePeakHours(data) {
            const labels  = data.map(i => `${i.hour}:00`);
            const entries = data.map(i => i.entry_count);

            const ctx = document.getElementById('peakChart').getContext('2d');
            if (peakChartInstance) peakChartInstance.destroy();
            peakChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: 'Entries by Hour',
                        data: entries,
                        backgroundColor: '#6366f1',
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        }

        function openPricingModal()  { document.getElementById('pricingModal').classList.remove('hidden'); }
        function closePricingModal() { document.getElementById('pricingModal').classList.add('hidden'); }

        document.getElementById('pricingForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const ruleId = document.getElementById('ruleId').value;

            try {
                const res = await apiFetch(`/api/v1/pricing-rules/${ruleId}/`, {
                    method: 'PUT',
                    body: JSON.stringify({
                        hourly_rate:    document.getElementById('hourlyRate').value,
                        max_daily_rate: document.getElementById('maxRate').value,
                    }),
                });
                if (res.ok) {
                    alert('Pricing updated successfully!');
                    closePricingModal();
                    document.getElementById('pricingForm').reset();
                } else {
                    const err = await res.json();
                    alert('Failed: ' + JSON.stringify(err));
                }
            } catch (err) {
                console.error(err);
                alert('Network error.');
            }
        });
    </script>
</body>
</html>
