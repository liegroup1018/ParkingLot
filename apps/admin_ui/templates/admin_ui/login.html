<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — ParkingLot</title>
  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    (function () {
      var saved = localStorage.getItem('pc-theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.setAttribute('data-theme', saved || (prefersDark ? 'dark' : 'light'));
    })();
  </script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 20px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-xl);
      padding: 48px 40px;
      box-shadow: var(--shadow-lg);
    }
    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }
    .login-brand h1 {
      font-size: 1.75rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .login-brand p {
      margin-top: 8px;
      color: var(--text-secondary);
      font-size: 0.875rem;
    }
    .alert-container {
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <div class="login-brand">
        <h1>🅿 ParkingLot</h1>
        <p>Administrator Sign In</p>
        <!-- Theme toggle -->
        <button type="button" class="theme-toggle-btn" id="theme-toggle-btn"
                aria-label="Toggle light/dark mode" title="Toggle theme"
                style="margin: 12px auto 0; display:flex;">
          <svg class="icon-moon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3a7 7 0 109.79 9.79z"/>
          </svg>
          <svg class="icon-sun" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="5"/>
            <path stroke-linecap="round" d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
          </svg>
        </button>
      </div>

      <div class="alert-container">
        <div id="error-alert" class="alert alert-error" style="display:none;"></div>
      </div>

      <!-- Plain HTML form — submission is intercepted by JS below.
           No action="" or csrf_token needed: we call the JWT API via fetch(). -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-input" type="text" name="username" id="username"
                 placeholder="Enter your admin username" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" name="password" id="password"
                 placeholder="Enter your password" autocomplete="current-password" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="totp_code">2FA Code (TOTP)</label>
          <input class="form-input" type="text" name="totp_code" id="totp_code"
                 placeholder="Enter 6-digit authenticator code"
                 autocomplete="one-time-code" inputmode="numeric"
                 pattern="[0-9]{6}" maxlength="6" required>
        </div>
        <button class="btn btn-primary btn-lg btn-block" type="submit" id="submit-btn">
          Secure Sign In
        </button>
      </form>
    </div>
  </div>

  <script>
    // If a valid token is already in sessionStorage, skip login.
    (function () {
      const token = sessionStorage.getItem('admin_access_token');
      if (token) {
        window.location.replace('/admin-dashboard/');
      }
    })();

    const form      = document.getElementById('login-form');
    const errorEl   = document.getElementById('error-alert');
    const submitBtn = document.getElementById('submit-btn');

    function showError(msg) {
      errorEl.textContent = '⚠ ' + msg;
      errorEl.style.display = 'block';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing in…';

      const payload = {
        username:  document.getElementById('username').value.trim(),
        password:  document.getElementById('password').value,
        totp_code: document.getElementById('totp_code').value.trim(),
      };

      try {
        const res = await fetch('/api/v1/auth/login/', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });

        const data = await res.json();

        if (!res.ok) {
          // The API returns { "detail": "..." } or our envelope { "error": { "message": "..." } }
          const msg = data?.error?.message
                   || data?.detail
                   || data?.non_field_errors?.[0]
                   || 'Login failed. Please check your credentials and TOTP code.';
          showError(msg);
          return;
        }

        // Validate that the authenticated user is an ADMIN.
        // The JWT payload embeds `role` (set in ParkingTokenObtainPairSerializer).
        const role = data?.role;
        if (role && role !== 'ADMIN') {
          showError('Access denied. Administrator privileges required.');
          return;
        }

        // Store tokens in sessionStorage (tab-scoped; cleared when browser closes).
        sessionStorage.setItem('admin_access_token',  data.access);
        sessionStorage.setItem('admin_refresh_token', data.refresh);

        window.location.replace('/admin-dashboard/');

      } catch (err) {
        showError('Network error. Please try again.');
        console.error(err);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Secure Sign In';
      }
    });

    // ── Theme toggle ─────────────────────────────────────────────
    document.getElementById('theme-toggle-btn').addEventListener('click', function () {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('pc-theme', next);
    });
  </script>
</body>
</html>
